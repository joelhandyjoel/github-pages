  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--osrs-bg-brown-dark);
    color: var(--osrs-text-normal);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .osrs-font { font-family: 'Press Start 2P', monospace; }
  .osrs-header {
    font-family: 'Press Start 2P', monospace;
    color: var(--osrs-text-gold);
    text-shadow: 2px 2px 0px #000;
  }
  button, .btn {
    background: var(--osrs-button-bg);
    color: var(--osrs-text-normal);
    border: 2px solid var(--osrs-border-dark);
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.65rem;
    text-shadow: 1px 1px 0 #000;
    transition: background 0.15s;
  }
  button:hover { background: var(--osrs-button-hover); color: var(--osrs-text-gold); }
  button:active { background: var(--osrs-button-active); }
  button.success { background: #24461a; }
  button.success:hover { background: #2c541e; }
  button.danger { background: #5c1b1b; }
  button.danger:hover { background: #6e2020; }
  button.warning { background: #634316; }
  button.warning:hover { background: #734e19; }
  input, textarea, select {
    background: var(--osrs-bg-brown-dark);
    color: var(--osrs-text-normal);
    border: 2px solid var(--osrs-border-dark);
    padding: 6px 10px;
    font-size: 0.9rem;
    box-shadow: inset 1px 1px 3px rgba(0,0,0,0.7);
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--osrs-text-gold);
    box-shadow: inset 1px 1px 4px rgba(0,0,0,0.8), 0 0 5px var(--osrs-text-gold);
    color: var(--osrs-text-gold);
  }

  /* Layout */
  .app {
    display: flex; flex-direction: column; align-items: center;
    padding: 20px;
    min-width: 0;
    width: 100%;
  }
  @media (max-width: 600px) {
    .app { padding: 8px; }
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 1200px;
    background: var(--osrs-bg-brown);
    border: 2px solid var(--osrs-border-light);
    padding: 12px 20px; margin-bottom: 15px;
    flex-wrap: wrap; gap: 10px;
    box-sizing: border-box;
  }
  .top-bar h1 { font-size: 1rem; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  @media (max-width: 600px) {
    .top-bar { padding: 10px 12px; }
    .top-bar h1 { font-size: 0.75rem; width: 100%; text-align: center; }
    button, .btn { padding: 6px 10px; font-size: 0.55rem; }
    .size-controls { padding: 6px 8px; gap: 4px; }
    .size-controls span { font-size: 0.5rem; }
  }

  /* Board wrapper should never overflow its container */
  .board-wrapper { max-width: 100%; box-sizing: border-box; }
  #board { max-width: 100%; }

  /* Board size controls */
  .size-controls {
    display: flex; align-items: center; gap: 8px;
    background: var(--osrs-bg-inventory);
    border: 2px solid var(--osrs-border-dark);
    padding: 8px 12px;
  }
  .size-controls span { color: var(--osrs-text-gold); font-family: 'Press Start 2P', monospace; font-size: 0.6rem; }

  /* Board */
  .board-wrapper {
    display: flex; flex-direction: column; align-items: center;
    background: var(--board-bg);
    padding: 15px; border: 4px solid var(--board-border-dark);
    box-shadow: inset 0 0 0 2px var(--board-border-light), 0 4px 12px rgba(0,0,0,0.5);
  }
  .board-row { display: flex; }
  .tile {
    width: 160px; height: 160px;
    background: transparent;
    border-top: 2px solid var(--board-border-light);
    border-left: 2px solid var(--board-border-light);
    border-right: 2px solid var(--board-border-dark);
    border-bottom: 2px solid var(--board-border-dark);
    cursor: pointer;
    position: relative;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    overflow: hidden;
    transition: filter 0.15s;
  }
  .tile .tile-bg-layer {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--board-tile-bg);
    pointer-events: none; z-index: 0;
  }
  .tile:hover { filter: brightness(1.2); }

  /* Randomise button — big hero button below the board */
  .randomise-wrap {
    display: flex; justify-content: center;
    margin: 20px 0 10px;
    width: 100%; max-width: 1200px;
  }
  button.randomise-btn {
    background: linear-gradient(180deg, #ff9c1f 0%, #c46a0a 100%);
    color: #fff;
    border: 3px solid var(--osrs-border-dark);
    padding: 18px 48px;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 2px;
    box-shadow: 0 4px 0 #000, inset 0 0 0 2px rgba(255,255,255,0.2), 0 0 20px rgba(255,152,31,0.3);
    border-radius: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button.randomise-btn:hover {
    background: linear-gradient(180deg, #ffb350 0%, #e08a1f 100%);
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 6px 0 #000, inset 0 0 0 2px rgba(255,255,255,0.25), 0 0 30px rgba(255,152,31,0.5);
  }
  button.randomise-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #000, inset 0 0 0 2px rgba(0,0,0,0.2);
  }

  /* Shuffle animation — tiles collapse to center, dice flashes, tiles fly back out */
  @keyframes tile-collapse {
    0%   { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; }
    100% { transform: translate(var(--shuffle-tx, 0), var(--shuffle-ty, 0)) rotate(var(--shuffle-rot, 180deg)) scale(0); opacity: 0; }
  }
  @keyframes tile-deal {
    0%   { transform: translate(var(--deal-tx, 0), var(--deal-ty, -200px)) rotate(var(--deal-rot, -180deg)) scale(0); opacity: 0; }
    60%  { opacity: 1; }
    80%  { transform: translate(0, 0) rotate(0) scale(1.08); opacity: 1; }
    100% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; }
  }
  .tile.shuffling-out {
    animation: tile-collapse 0.5s cubic-bezier(0.6, -0.2, 0.8, 0.4) both;
  }
  .tile.shuffling-in {
    animation: tile-deal 0.55s cubic-bezier(0.2, 1.3, 0.5, 1) both;
  }
  #board { perspective: 1200px; }

  /* Dice overlay during shuffle */
  @keyframes dice-blast {
    0%   { transform: translate(-50%, -50%) rotate(0) scale(0.2); opacity: 0; filter: drop-shadow(0 0 5px #ff981f); }
    20%  { transform: translate(-50%, -50%) rotate(360deg) scale(1.6); opacity: 1; filter: drop-shadow(0 0 40px #ff981f) drop-shadow(0 0 20px #ffff00); }
    70%  { transform: translate(-50%, -50%) rotate(900deg) scale(1.2); opacity: 1; filter: drop-shadow(0 0 30px #ff981f); }
    100% { transform: translate(-50%, -50%) rotate(1080deg) scale(3); opacity: 0; filter: drop-shadow(0 0 0 transparent); }
  }
  .dice-overlay {
    position: fixed;
    top: 50%; left: 50%;
    font-size: 7rem;
    z-index: 9999;
    pointer-events: none;
    animation: dice-blast 0.9s ease-in-out forwards;
  }

  /* Board flash during shuffle */
  @keyframes board-flash {
    0%, 100% { filter: none; }
    50%      { filter: brightness(1.4) saturate(1.3); }
  }
  #board-export-area.shuffling {
    animation: board-flash 0.8s ease-in-out;
  }
  .tile .tile-img-zone {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    min-height: 0;
    z-index: 1;
  }
  .tile .tile-bg {
    max-width: calc(100% - 8px); max-height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .tile .tile-title {
    position: relative;
    font-family: var(--board-font);
    font-size: 1em; /* scales via tile's font-size (set in JS) */
    color: var(--board-tile-title);
    text-shadow: 1px 1px 0 #000;
    text-align: center;
    padding: 0.3em 0.3em 0.1em;
    word-break: break-word;
    line-height: 1.3;
    z-index: 2;
  }
  .tile .tile-desc {
    position: relative;
    font-family: var(--board-font);
    font-size: 1em;
    color: var(--board-tile-text);
    text-shadow: 1px 1px 0 #000;
    text-align: center;
    padding: 0.15em 0.3em;
    word-break: break-word;
    line-height: 1.25;
    overflow: hidden;
    z-index: 2;
  }
  .tile .tile-bottom {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.15em 0.3em 0.25em;
    z-index: 2;
  }
  .tile .tile-points {
    font-family: var(--board-font);
    font-size: 0.8em;
    color: var(--board-tile-text);
    text-shadow: 1px 1px 0 #000;
    text-align: right;
    flex: 1;
  }
  .tile .tier-icon {
    width: 1.3em; height: 1.3em;
    image-rendering: pixelated;
    flex-shrink: 0;
  }
  .tile .tier-tint {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 0;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex; justify-content: center; align-items: center;
    z-index: 1000;
  }
  .modal {
    background: var(--osrs-bg-inventory);
    border: 4px solid var(--osrs-border-dark);
    box-shadow: inset 0 0 0 2px var(--osrs-border-light), 0 8px 32px rgba(0,0,0,0.5);
    max-width: 600px; width: 90%;
    max-height: 85vh; overflow-y: auto;
    padding: 20px;
  }
  .modal h2 { margin-bottom: 15px; font-size: 0.85rem; }
  .modal label {
    display: block; margin: 10px 0 4px;
    color: var(--osrs-text-gold);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
  }
  .modal input[type="text"], .modal input[type="number"], .modal textarea {
    width: 100%; margin-bottom: 5px;
  }
  .modal textarea { height: 60px; resize: vertical; }
  .modal-footer { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }

  /* Wiki search results */
  .wiki-search-results {
    max-height: 200px; overflow-y: auto;
    background: var(--osrs-bg-brown-dark);
    border: 2px solid var(--osrs-border-dark);
    margin: 8px 0;
  }
  .wiki-result {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; cursor: pointer;
    border-bottom: 1px solid var(--osrs-border-dark);
  }
  .wiki-result:hover { background: var(--osrs-bg-brown); color: var(--osrs-text-gold); }
  .wiki-result img { width: 32px; height: 32px; object-fit: contain; }

  /* Board title input */
  .board-title-wrap {
    margin: 12px 0; text-align: center;
  }
  .board-title-input {
    background: transparent; border: none;
    color: var(--board-title-color);
    font-family: var(--board-font);
    font-size: 1.1rem;
    text-shadow: 2px 2px 0 #000;
    text-align: center;
    width: 100%; max-width: 500px;
    padding: 8px;
    box-shadow: none;
  }
  .board-title-input:focus {
    border: none;
    box-shadow: none;
    outline: 1px dashed var(--osrs-text-gold);
  }
  .board-title-input::placeholder { color: #5d503f; }

  /* Export canvas hidden */
  #export-canvas { display: none; }

  /* Alert */
  .alert {
    background: #634316;
    color: #fffac9;
    border: 2px solid var(--osrs-border-light);
    padding: 10px 16px;
    margin-bottom: 10px;
    font-size: 0.85rem;
    max-width: 1200px; width: 100%;
    text-align: center;
  }

  /* Save/Load */
  .saved-boards {
    margin-top: 15px; max-width: 1200px; width: 100%;
  }
  .saved-boards h3 { font-size: 0.7rem; margin-bottom: 8px; }
  .saved-board-item {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--osrs-bg-brown);
    border: 1px solid var(--osrs-border-dark);
    padding: 8px 12px; margin-bottom: 4px;
    cursor: pointer;
  }
  .saved-board-item:hover { background: var(--osrs-bg-inventory); color: var(--osrs-text-gold); }
  .saved-board-item .delete-btn {
    padding: 4px 8px; font-size: 0.5rem;
  }

  /* Custom image upload area */
  .custom-upload-btn { margin-top: 5px; }

  /* Opacity slider */
  input[type="range"] {
    -webkit-appearance: none; width: 100%;
    height: 6px; background: var(--osrs-border-dark);
    outline: none; border: none; box-shadow: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    background: var(--osrs-text-gold); cursor: pointer;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 12px; }
  ::-webkit-scrollbar-track { background: var(--osrs-bg-brown-dark); }
  ::-webkit-scrollbar-thumb { background: var(--osrs-button-bg); border: 2px solid var(--osrs-border-dark); }
  ::-webkit-scrollbar-thumb:hover { background: var(--osrs-button-hover); }

  /* Hide number input spinners globally */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  input[type="number"] { -moz-appearance: textfield; }

  /* Branding modal */
  .color-row {
    display: flex; align-items: center; gap: 10px;
    margin: 6px 0; padding: 8px 10px;
    background: var(--osrs-bg-brown-dark);
    border: 1px solid var(--osrs-border-dark);
  }
  .color-row label {
    width: 100px; min-width: 100px;
    margin: 0; font-size: 0.5rem;
    color: var(--osrs-text-normal);
    font-family: 'Press Start 2P', monospace;
    line-height: 1.4;
  }
  .color-row input[type="color"] {
    width: 36px; height: 28px; padding: 0;
    border: 2px solid var(--osrs-border-dark);
    cursor: pointer; background: none;
    box-shadow: none; flex-shrink: 0;
  }
  .color-row .hex-input {
    flex: 1; font-size: 0.75rem; text-align: center;
    font-family: monospace; min-width: 0;
  }

  /* Tier config rows */
  .tier-row {
    display: flex; align-items: center; gap: 8px;
    margin: 6px 0; padding: 8px 10px;
    background: var(--osrs-bg-brown-dark);
    border: 1px solid var(--osrs-border-dark);
  }
  .tier-row input[type="text"] {
    width: 110px; font-size: 0.75rem; padding: 5px 8px;
  }
  .tier-row .tier-pts-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.4rem; color: var(--osrs-text-normal);
    white-space: nowrap; margin: 0;
  }
  .tier-row input[type="number"] {
    width: 50px; font-size: 0.75rem; padding: 5px 6px;
    text-align: center;
  }
  .tier-row input[type="color"] {
    width: 30px; height: 26px; padding: 0;
    border: 2px solid var(--osrs-border-dark);
    cursor: pointer; background: none;
    box-shadow: none; flex-shrink: 0;
  }
  .tier-row .tier-icon-slot {
    width: 32px; height: 32px;
    min-width: 32px; max-width: 32px;
    min-height: 32px; max-height: 32px;
    padding: 2px;
    background: var(--osrs-bg-inventory);
    border: 2px solid var(--osrs-border-dark);
    cursor: pointer;
    flex-shrink: 0; flex-grow: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace;
    color: var(--osrs-text-normal);
    overflow: hidden;
    box-sizing: border-box;
  }
  .tier-row .tier-icon-slot img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .tier-row .tier-icon-slot:hover {
    border-color: var(--osrs-text-gold);
    background: var(--osrs-bg-brown);
  }

  /* Tier selector buttons in tile edit modal */
  .tier-btn-group {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(95px, 1fr));
    grid-auto-rows: 1fr;
    gap: 6px;
    margin: 6px 0 10px;
    padding: 8px;
    background: var(--osrs-bg-brown-dark);
    border: 1px solid var(--osrs-border-dark);
  }
  button.tier-btn {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    padding: 14px 4px 10px;
    min-height: 54px;
    background: var(--osrs-button-bg);
    border: 2px solid var(--osrs-border-dark);
    font-size: 0.6rem;
    cursor: pointer;
    transition: background 0.12s, transform 0.08s, box-shadow 0.12s;
    overflow: hidden;
  }
  button.tier-btn::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--tier-color, #555);
  }
  button.tier-btn:hover {
    background: var(--osrs-button-hover);
    color: var(--osrs-text-gold);
    transform: translateY(-1px);
  }
  button.tier-btn.active {
    background: var(--tier-color, #555);
    color: #fff;
    border-color: var(--osrs-text-gold);
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25), 0 0 8px rgba(255,152,31,0.5);
  }
  button.tier-btn.active::before {
    background: var(--osrs-text-gold);
  }
  button.tier-btn .tier-btn-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    text-shadow: 1px 1px 0 #000;
    line-height: 1.25;
    word-break: break-word;
    text-align: center;
    max-width: 100%;
  }
  button.tier-btn[data-long-name="true"] .tier-btn-name {
    font-size: 0.42rem;
  }
  button.tier-btn .tier-btn-pts {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem;
    opacity: 0.8;
  }

  /* Branding preview tile */
  .branding-preview {
    display: flex; justify-content: center;
    margin: 12px 0;
  }
  .branding-preview .preview-tile {
    width: 150px; height: 150px;
    background: var(--board-tile-bg);
    border-top: 3px solid var(--board-border-light);
    border-left: 3px solid var(--board-border-light);
    border-right: 3px solid var(--board-border-dark);
    border-bottom: 3px solid var(--board-border-dark);
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    overflow: hidden;
    position: relative;
  }
  .branding-preview .preview-tile .pv-title {
    font-family: var(--board-font);
    font-size: 0.55rem;
    color: var(--board-tile-title);
    text-shadow: 1px 1px 0 #000;
    text-align: center;
    padding: 4px 4px 1px;
  }
  .branding-preview .preview-tile .pv-img-zone {
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    opacity: 0.4;
  }
  .branding-preview .preview-tile .pv-desc {
    font-family: var(--board-font);
    font-size: 0.5rem;
    color: var(--board-tile-text);
    text-shadow: 1px 1px 0 #000;
    text-align: center;
    padding: 2px 4px;
  }
  .branding-preview .preview-tile .pv-bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 1px 4px 3px;
  }
  .branding-preview .preview-tile .pv-pts {
    font-family: var(--board-font);
    font-size: 0.4rem;
    color: var(--board-tile-text);
    text-shadow: 1px 1px 0 #000;
    flex: 1; text-align: right;
  }
  .branding-preview .preview-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--board-bg);
    padding: 10px 14px;
    border: 3px solid var(--board-border-dark);
    box-shadow: inset 0 0 0 2px var(--board-border-light);
  }
  .branding-preview .preview-board-title {
    font-family: var(--board-font);
    font-size: 0.5rem;
    color: var(--board-title-color);
    text-shadow: 1px 1px 0 #000;
  }

  .branding-section-title {
    font-family: 'Press Start 2P', monospace;
    color: var(--osrs-text-gold);
    font-size: 0.55rem;
    margin: 14px 0 4px;
    text-shadow: 1px 1px 0 #000;
    border-bottom: 1px solid var(--osrs-border-dark);
    padding-bottom: 4px;
  }
  .clan-logo-preview {
    max-width: 120px; max-height: 60px;
    margin: 8px 0;
    image-rendering: auto;
  }
  .board-clan-logo {
    max-width: 150px; max-height: 60px;
    margin: 8px 0;
  }
</style>

<body>
<div class="app" id="app">
  <div class="top-bar">
    <h1 class="osrs-header">Bingo Board Creator</h1>
    <div class="controls">
      <div class="size-controls">
        <button onclick="changeSize('rows', -1)">-</button>
        <span>Rows: <span id="row-count">5</span></span>
        <button onclick="changeSize('rows', 1)">+</button>
        <button onclick="changeSize('cols', -1)">-</button>
        <span>Cols: <span id="col-count">5</span></span>
        <button onclick="changeSize('cols', 1)">+</button>
      </div>
      <button class="success" onclick="exportBoard()">Export as Image</button>
      <button class="warning" onclick="saveBoard()">Save Board</button>
      <button onclick="showLoadDialog()">Load Board</button>
      <button onclick="openBrandingModal()">Branding</button>
      <button onclick="openTiersModal()">Tiers</button>
    </div>
  </div>
  <div id="alert-box"></div>
  <div class="board-wrapper" id="board-export-area">
    <div class="board-title-wrap">
      <input type="text" class="board-title-input" id="board-title" placeholder="Click to name your board..." value="Bingo Board">
      <div id="clan-logo-area"></div>
    </div>
    <div id="board"></div>
  </div>
  <div class="randomise-wrap">
    <button class="randomise-btn" onclick="randomiseTiles()">🎲 Randomise</button>
  </div>
  <div class="saved-boards" id="saved-boards-section" style="display:none"></div>
</div>

<!-- Modal container -->
<div id="modal-root"></div>
<canvas id="export-canvas"></canvas>

<script>
// ========== RUNESCAPE FONTS ==========
const RUNESCAPE_FONTS = {
  'Press Start 2P': "'Press Start 2P', monospace",
  'Bold-12': 'RuneScape-Bold-12',
  'Plain-12': 'RuneScape-Plain-12',
  'Quill': 'RuneScape-Quill',
  'Surok': 'RuneScape-Surok'
};

// ========== DEFAULT THEME ==========
// Only board-specific colors — the surrounding UI stays as-is
const DEFAULT_THEME = {
  '--board-bg': '#2b261e',
  '--board-tile-bg': '#463d32',
  '--board-border-dark': '#1d1813',
  '--board-border-light': '#5d503f',
  '--board-title-color': '#ff981f',
  '--board-tile-title': '#ffff00',
  '--board-tile-text': '#dbceb4'
};

const THEME_LABELS = {
  '--board-bg': 'Board Background',
  '--board-tile-bg': 'Tile Background',
  '--board-border-dark': 'Tile Border Dark',
  '--board-border-light': 'Tile Border Light',
  '--board-title-color': 'Board Title',
  '--board-tile-title': 'Tile Title Text',
  '--board-tile-text': 'Tile Points Text'
};

// ========== TIERS ==========
// Colors based on OSRS Clue Scroll tiers
const DEFAULT_TIERS = [
  { name: 'Easy',        minPts: 5,  color: '#3a8c2a', iconUrl: 'https://oldschool.runescape.wiki/images/Combat_Achievements_-_easy_tier_icon.png' },
  { name: 'Medium',      minPts: 10, color: '#c47b1a', iconUrl: 'https://oldschool.runescape.wiki/images/Combat_Achievements_-_medium_tier_icon.png' },
  { name: 'Hard',        minPts: 15, color: '#8a2ab5', iconUrl: 'https://oldschool.runescape.wiki/images/Combat_Achievements_-_hard_tier_icon.png' },
  { name: 'Elite',       minPts: 20, color: '#1a7a8c', iconUrl: 'https://oldschool.runescape.wiki/images/Combat_Achievements_-_elite_tier_icon.png' },
  { name: 'Master',      minPts: 25, color: '#b52a2a', iconUrl: 'https://oldschool.runescape.wiki/images/Combat_Achievements_-_master_tier_icon.png' },
  { name: 'Grandmaster', minPts: 30, color: '#d4a017', iconUrl: 'https://oldschool.runescape.wiki/images/Combat_Achievements_-_grandmaster_tier_icon.png' }
];

function getTier(points) {
  if (!boardState.tiers || points <= 0) return null;
  // Exact match — a tile belongs to the tier whose point value matches
  return boardState.tiers.find(t => t.minPts === points) || null;
}

// ========== STATE ==========
let boardState = {
  title: 'Bingo Board',
  rows: 5,
  cols: 5,
  tiles: [],
  theme: null,
  clanLogo: null,
  boardBgImage: null,
  tileOpacity: 100,
  font: 'Press Start 2P',
  tiers: JSON.parse(JSON.stringify(DEFAULT_TIERS))
};

function initTiles() {
  boardState.tiles = [];
  for (let r = 0; r < boardState.rows; r++) {
    boardState.tiles[r] = [];
    for (let c = 0; c < boardState.cols; c++) {
      boardState.tiles[r][c] = {
        title: '',
        description: '',
        points: 0,
        image: null // {url, opacity, usePixel}
      };
    }
  }
}

function resizeTiles(newRows, newCols) {
  const old = boardState.tiles;
  const tiles = [];
  for (let r = 0; r < newRows; r++) {
    tiles[r] = [];
    for (let c = 0; c < newCols; c++) {
      if (old[r] && old[r][c]) {
        tiles[r][c] = old[r][c];
      } else {
        tiles[r][c] = { title: '', description: '', points: 0, image: null };
      }
    }
  }
  boardState.tiles = tiles;
  boardState.rows = newRows;
  boardState.cols = newCols;
}

// ========== RENDER ==========
// When set, renderBoard() uses this fixed tile size instead of calculating from viewport.
// Used during export so the PNG is always a consistent size.
let _fixedTileSize = null;
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  let dem;
  if (_fixedTileSize != null) {
    dem = _fixedTileSize;
  } else {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Measure elements NOT dependent on the board itself (top-bar, board title area).
    const topBar = document.querySelector('.top-bar');
    const alertBox = document.getElementById('alert-box');
    const titleWrap = document.querySelector('.board-title-wrap');
    const RANDOMISE_BTN_H = 80; // fixed — hero button with padding + margins
    const APP_PADDING_Y = (vw < 600 ? 8 : 20) * 2;
    const BOARD_WRAPPER_V = 15 * 2 + 4 * 2 + 30; // padding + border + breathing room
    const chromeH = (topBar ? topBar.offsetHeight : 60)
      + (alertBox && alertBox.offsetHeight ? alertBox.offsetHeight + 10 : 0)
      + (titleWrap ? titleWrap.offsetHeight : 60)
      + RANDOMISE_BTN_H
      + APP_PADDING_Y
      + BOARD_WRAPPER_V;
    // Horizontal chrome: app padding + board-wrapper padding + borders + small safety
    const sideChromeW = APP_PADDING_Y + 15 * 2 + 4 * 2 + 10;
    const availW = vw - sideChromeW;
    const availH = Math.max(120, vh - chromeH);
    const maxW = availW / boardState.cols;
    const maxH = availH / boardState.rows;
    // Max cap: 140px on desktop so the board doesn't overwhelm a huge screen.
    // Min floor: 35px so the board shrinks down further on narrow windows
    // (content still readable, just compact).
    dem = Math.min(maxW, maxH, 140);
    dem = Math.max(dem, 35);
  }

  for (let r = 0; r < boardState.rows; r++) {
    const row = document.createElement('div');
    row.className = 'board-row';
    for (let c = 0; c < boardState.cols; c++) {
      const tile = boardState.tiles[r][c];
      const el = document.createElement('div');
      el.className = 'tile';
      el.style.width = dem + 'px';
      el.style.height = dem + 'px';
      // Base font size scales with tile — all child text uses em
      el.style.fontSize = Math.max(8, Math.round(dem * 0.095)) + 'px';
      const tileOp = boardState.tileOpacity != null ? boardState.tileOpacity : 100;

      // Tile background layer (carries the opacity, not the whole tile)
      const bgLayer = document.createElement('div');
      bgLayer.className = 'tile-bg-layer';
      if (tileOp < 100) bgLayer.style.opacity = tileOp / 100;
      el.appendChild(bgLayer);

      // Tier tint (also faded with tile opacity so background shows through)
      const tier = getTier(tile.points);
      if (tier) {
        const tint = document.createElement('div');
        tint.className = 'tier-tint';
        tint.style.background = tier.color + '88';
        if (tileOp < 100) tint.style.opacity = tileOp / 100;
        el.appendChild(tint);
      }

      // Row 1: Title
      const titleDiv = document.createElement('div');
      titleDiv.className = 'tile-title';
      titleDiv.textContent = tile.title;
      const tLen = tile.title.length;
      if (tLen > 30) titleDiv.style.fontSize = '0.65em';
      else if (tLen > 20) titleDiv.style.fontSize = '0.8em';
      el.appendChild(titleDiv);

      // Row 2: Image zone (fills remaining space)
      const imgZone = document.createElement('div');
      imgZone.className = 'tile-img-zone';
      if (tile.image && tile.image.url) {
        const img = document.createElement('img');
        img.className = 'tile-bg';
        img.src = tile.image.url;
        img.style.opacity = (tile.image.opacity || 100) / 100;
        if (tile.image.usePixel) img.style.imageRendering = 'pixelated';
        imgZone.appendChild(img);
      }
      el.appendChild(imgZone);

      // Row 3: Description
      const descDiv = document.createElement('div');
      descDiv.className = 'tile-desc';
      if (tile.description) {
        const dLen = tile.description.length;
        if (dLen > 50) descDiv.style.fontSize = '0.65em';
        else if (dLen > 30) descDiv.style.fontSize = '0.8em';
        descDiv.textContent = tile.description;
      }
      el.appendChild(descDiv);

      // Row 4: Bottom bar (tier icon + points)
      const bottomDiv = document.createElement('div');
      bottomDiv.className = 'tile-bottom';
      if (tier && tier.iconUrl) {
        const icon = document.createElement('img');
        icon.className = 'tier-icon';
        icon.src = tier.iconUrl;
        icon.title = tier.name;
        bottomDiv.appendChild(icon);
      }
      if (tile.points > 0) {
        const ptsSpan = document.createElement('span');
        ptsSpan.className = 'tile-points';
        ptsSpan.textContent = tile.points + ' pts';
        bottomDiv.appendChild(ptsSpan);
      }
      el.appendChild(bottomDiv);

      el.addEventListener('click', () => openTileModal(r, c));
      row.appendChild(el);
    }
    board.appendChild(row);
  }

  document.getElementById('row-count').textContent = boardState.rows;
  document.getElementById('col-count').textContent = boardState.cols;
  document.getElementById('board-title').value = boardState.title;
}

// ========== SIZE CONTROLS ==========
function changeSize(dim, delta) {
  if (dim === 'rows') {
    const newVal = Math.max(1, Math.min(10, boardState.rows + delta));
    resizeTiles(newVal, boardState.cols);
  } else {
    const newVal = Math.max(1, Math.min(10, boardState.cols + delta));
    resizeTiles(boardState.rows, newVal);
  }
  renderBoard();
}

// ========== RANDOMISE ==========
let _shuffling = false;
async function randomiseTiles() {
  if (_shuffling) return;
  _shuffling = true;

  const board = document.getElementById('board');
  const wrapper = document.getElementById('board-export-area');
  const tileEls = Array.from(board.querySelectorAll('.tile'));
  if (tileEls.length === 0) { _shuffling = false; return; }

  // Compute the board's centre in page coords so tiles can "collapse" toward it
  const bRect = board.getBoundingClientRect();
  const cx = bRect.left + bRect.width / 2;
  const cy = bRect.top + bRect.height / 2;

  // Board flash effect
  wrapper.classList.add('shuffling');
  setTimeout(() => wrapper.classList.remove('shuffling'), 800);

  // Phase 1 — COLLAPSE: each tile moves toward the board centre while rotating
  tileEls.forEach((el) => {
    const r = el.getBoundingClientRect();
    const tileCx = r.left + r.width / 2;
    const tileCy = r.top + r.height / 2;
    const tx = Math.round(cx - tileCx);
    const ty = Math.round(cy - tileCy);
    // Random-ish spin direction for variety
    const rot = (Math.random() < 0.5 ? -1 : 1) * (180 + Math.random() * 180);
    el.style.setProperty('--shuffle-tx', tx + 'px');
    el.style.setProperty('--shuffle-ty', ty + 'px');
    el.style.setProperty('--shuffle-rot', rot + 'deg');
    // Stagger from corners inward — distance from centre
    const dist = Math.sqrt(tx * tx + ty * ty);
    const maxDist = Math.sqrt(bRect.width * bRect.width + bRect.height * bRect.height) / 2;
    const delay = Math.round(200 * (1 - dist / maxDist)); // outermost first
    el.style.animationDelay = delay + 'ms';
    el.classList.add('shuffling-out');
  });

  // Dice blast fires mid-collapse
  setTimeout(() => {
    const dice = document.createElement('div');
    dice.className = 'dice-overlay';
    dice.textContent = '🎲';
    document.body.appendChild(dice);
    setTimeout(() => dice.remove(), 900);
  }, 300);

  await new Promise(r => setTimeout(r, 750));

  // Phase 2 — shuffle data
  const flat = [];
  for (let r = 0; r < boardState.rows; r++) {
    for (let c = 0; c < boardState.cols; c++) flat.push(boardState.tiles[r][c]);
  }
  for (let i = flat.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [flat[i], flat[j]] = [flat[j], flat[i]];
  }
  let idx = 0;
  for (let r = 0; r < boardState.rows; r++) {
    for (let c = 0; c < boardState.cols; c++) boardState.tiles[r][c] = flat[idx++];
  }
  balanceBoardPoints();

  // Short pause while dice is still on screen
  await new Promise(r => setTimeout(r, 150));

  // Phase 3 — re-render then DEAL back in from random directions
  renderBoard();
  const newTiles = Array.from(board.querySelectorAll('.tile'));

  // Set trajectories + starting state BEFORE the browser paints
  newTiles.forEach((el) => {
    // Fly in from a random direction (above, below, left, right)
    const angle = Math.random() * Math.PI * 2;
    const dist = 200 + Math.random() * 100;
    const tx = Math.round(Math.cos(angle) * dist);
    const ty = Math.round(Math.sin(angle) * dist);
    const rot = (Math.random() < 0.5 ? -1 : 1) * (180 + Math.random() * 180);
    el.style.setProperty('--deal-tx', tx + 'px');
    el.style.setProperty('--deal-ty', ty + 'px');
    el.style.setProperty('--deal-rot', rot + 'deg');
  });

  // Stagger by distance from centre — innermost first this time
  const newRect = board.getBoundingClientRect();
  const ncx = newRect.left + newRect.width / 2;
  const ncy = newRect.top + newRect.height / 2;
  newTiles.forEach((el) => {
    const r = el.getBoundingClientRect();
    const tx = (r.left + r.width / 2) - ncx;
    const ty = (r.top + r.height / 2) - ncy;
    const dist = Math.sqrt(tx * tx + ty * ty);
    const maxDist = Math.sqrt(newRect.width * newRect.width + newRect.height * newRect.height) / 2;
    const delay = Math.round(30 * (dist / maxDist) * Math.sqrt(newTiles.length));
    el.style.animationDelay = delay + 'ms';
    el.classList.add('shuffling-in');
  });

  // Wait for longest tile to finish
  await new Promise(r => setTimeout(r, 700 + Math.round(30 * Math.sqrt(newTiles.length))));

  // Clean up
  newTiles.forEach(el => {
    el.classList.remove('shuffling-in');
    el.style.animationDelay = '';
    el.style.removeProperty('--deal-tx');
    el.style.removeProperty('--deal-ty');
    el.style.removeProperty('--deal-rot');
  });
  _shuffling = false;
}

function computeBoardImbalance() {
  const R = boardState.rows;
  const C = boardState.cols;
  const rowSums = new Array(R).fill(0);
  const colSums = new Array(C).fill(0);
  let diag1 = 0, diag2 = 0;
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const p = Number(boardState.tiles[r][c].points) || 0;
      rowSums[r] += p;
      colSums[c] += p;
      if (R === C) {
        if (r === c) diag1 += p;
        if (r + c === R - 1) diag2 += p;
      }
    }
  }
  // Score = sum of squared deviations from the mean of each group
  const deviate = (arr) => {
    if (arr.length < 2) return 0;
    const mean = arr.reduce((a, b) => a + b, 0) / arr.length;
    return arr.reduce((s, v) => s + (v - mean) * (v - mean), 0);
  };
  let score = deviate(rowSums) + deviate(colSums);
  if (R === C && R > 1) {
    // Diagonals against the overall mean of all sums
    const allMean = (rowSums.reduce((a, b) => a + b, 0) + colSums.reduce((a, b) => a + b, 0)) / (R + C);
    score += (diag1 - allMean) * (diag1 - allMean);
    score += (diag2 - allMean) * (diag2 - allMean);
  }
  return score;
}

function balanceBoardPoints() {
  const R = boardState.rows;
  const C = boardState.cols;
  const total = R * C;
  if (total < 4) return;

  // Hill climbing: try pairwise swaps that reduce imbalance.
  // Run until a full pass yields no improvement, or max iterations reached.
  let iterations = 0;
  const maxIterations = Math.min(2000, total * total * 4);
  let improved = true;
  let bestScore = computeBoardImbalance();

  while (improved && iterations < maxIterations) {
    improved = false;
    // Try every pair
    for (let a = 0; a < total && iterations < maxIterations; a++) {
      for (let b = a + 1; b < total && iterations < maxIterations; b++) {
        iterations++;
        const ra = Math.floor(a / C), ca = a % C;
        const rb = Math.floor(b / C), cb = b % C;
        // Skip swap if both tiles have the same points (no effect)
        if (boardState.tiles[ra][ca].points === boardState.tiles[rb][cb].points) continue;
        // Swap
        const tmp = boardState.tiles[ra][ca];
        boardState.tiles[ra][ca] = boardState.tiles[rb][cb];
        boardState.tiles[rb][cb] = tmp;
        const newScore = computeBoardImbalance();
        if (newScore < bestScore) {
          bestScore = newScore;
          improved = true;
        } else {
          // revert
          boardState.tiles[rb][cb] = boardState.tiles[ra][ca];
          boardState.tiles[ra][ca] = tmp;
        }
      }
    }
  }
}

// ========== TILE MODAL ==========
function openTileModal(r, c) {
  const tile = boardState.tiles[r][c];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  const modal = document.createElement('div');
  modal.className = 'modal';

  // Build tier buttons (None + each configured tier)
  const currentTier = getTier(tile.points);
  const tierBtns = [`<button type="button" class="tier-btn ${tile.points === 0 ? 'active' : ''}" data-pts="0" style="--tier-color:#555">
    <span class="tier-btn-name">None</span>
    <span class="tier-btn-pts">0 pts</span>
  </button>`];
  for (const t of boardState.tiers) {
    const isActive = currentTier && currentTier.name === t.name && tile.points === t.minPts;
    const longName = t.name.length > 8 ? 'true' : 'false';
    tierBtns.push(`<button type="button" class="tier-btn ${isActive ? 'active' : ''}" data-pts="${t.minPts}" data-long-name="${longName}" style="--tier-color:${t.color}">
      <span class="tier-btn-name">${escHtml(t.name)}</span>
      <span class="tier-btn-pts">${t.minPts} pts</span>
    </button>`);
  }

  const html = `
    <h2 class="osrs-header">Edit Tile [${r+1}, ${c+1}]</h2>
    <label>Title</label>
    <input type="text" id="modal-title" value="${escHtml(tile.title)}" placeholder="Tile title...">
    <label>Description</label>
    <textarea id="modal-desc" placeholder="Optional description...">${escHtml(tile.description)}</textarea>
    <label>Tier / Points</label>
    <div class="tier-btn-group" id="modal-tier-btns">${tierBtns.join('')}</div>
    <label>Tile Image</label>
    <div id="modal-image-section"></div>
    <div class="modal-footer">
      <button class="danger" id="modal-close">Close</button>
      <button class="success" id="modal-save">Save</button>
    </div>
  `;

  modal.innerHTML = html;
  overlay.appendChild(modal);
  document.getElementById('modal-root').appendChild(overlay);

  // Tier button selection
  let selectedPts = tile.points;
  modal.querySelectorAll('.tier-btn').forEach(btn => {
    btn.onclick = () => {
      modal.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPts = Number(btn.dataset.pts);
    };
  });

  // Image section
  renderImageSection(tile, r, c);

  document.getElementById('modal-close').onclick = () => overlay.remove();
  document.getElementById('modal-save').onclick = () => {
    tile.title = document.getElementById('modal-title').value;
    tile.description = document.getElementById('modal-desc').value;
    tile.points = selectedPts;
    renderBoard();
    overlay.remove();
  };
}

function renderImageSection(tile, r, c) {
  const section = document.getElementById('modal-image-section');
  if (!section) return;

  if (tile.image && tile.image.url) {
    section.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin:8px 0">
        <img src="${tile.image.url}" style="max-width:60px;max-height:60px;image-rendering:pixelated;opacity:${(tile.image.opacity||100)/100}">
        <div>
          <label style="margin:0">Opacity: <span id="opacity-val">${tile.image.opacity || 100}%</span></label>
          <input type="range" id="img-opacity" min="1" max="100" value="${tile.image.opacity || 100}">
          <div style="margin-top:5px">
            <label style="display:inline;margin:0">
              <input type="checkbox" id="img-pixel" ${tile.image.usePixel ? 'checked' : ''}> Pixel rendering
            </label>
          </div>
        </div>
        <button class="danger" id="remove-img" style="margin-left:auto">Remove</button>
      </div>
    `;
    document.getElementById('img-opacity').oninput = (e) => {
      tile.image.opacity = Number(e.target.value);
      document.getElementById('opacity-val').textContent = e.target.value + '%';
      section.querySelector('img').style.opacity = e.target.value / 100;
    };
    document.getElementById('img-pixel').onchange = (e) => {
      tile.image.usePixel = e.target.checked;
    };
    document.getElementById('remove-img').onclick = () => {
      tile.image = null;
      renderImageSection(tile, r, c);
    };
  } else {
    section.innerHTML = `
      <div style="display:flex;gap:5px;margin:8px 0">
        <input type="text" id="wiki-query" placeholder="Search OSRS Wiki... e.g. Coins, Infernal cape, Twisted bow" style="flex:1">
      </div>
      <div style="font-size:0.75rem;color:#5d503f;margin-bottom:5px">Type any item, pet, or NPC name to find its image</div>
      <div id="wiki-results"></div>
      <div style="margin-top:8px">
        <button class="custom-upload-btn" id="custom-upload-btn">Upload Custom Image</button>
        <input type="file" id="custom-file-input" accept=".png,.jpg,.jpeg" style="display:none">
      </div>
    `;
    let debounceTimer;
    document.getElementById('wiki-query').oninput = (e) => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => wikiSearch(e.target.value, tile, r, c), 600);
    };
    document.getElementById('wiki-query').focus();
    document.getElementById('custom-upload-btn').onclick = () => {
      document.getElementById('custom-file-input').click();
    };
    document.getElementById('custom-file-input').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        tile.image = { url: ev.target.result, opacity: 100, usePixel: false };
        renderImageSection(tile, r, c);
      };
      reader.readAsDataURL(file);
    };
  }
}

let badTitles = [];
function wikiSearch(query, tile, r, c) {
  const results = document.getElementById('wiki-results');
  if (!results) return;
  if (!query.trim()) { results.innerHTML = ''; return; }
  query = query.charAt(0).toUpperCase() + query.slice(1).toLowerCase();
  results.innerHTML = '<div style="color:var(--osrs-text-gold);padding:8px">Searching...</div>';

  fetch(`https://oldschool.runescape.wiki/rest.php/v1/search/title?q=${encodeURIComponent(query)}&limit=8`)
    .then(r => r.json())
    .then(async data => {
      if (!data.pages || data.pages.length === 0) {
        results.innerHTML = '<div style="color:#5d503f;padding:8px">No results found</div>';
        return;
      }
      const items = [];
      for (const page of data.pages) {
        if (page.thumbnail && !badTitles.includes(page.title)) {
          const url = getWikiImageUrl(page.title);
          try {
            const resp = await fetch(url, { method: 'HEAD' });
            if (resp.ok) {
              items.push({ title: page.title, thumb: page.thumbnail.url, url });
            } else {
              badTitles.push(page.title);
            }
          } catch { badTitles.push(page.title); }
        }
      }
      if (items.length === 0) {
        results.innerHTML = '<div style="color:#5d503f;padding:8px">No images found, try different search</div>';
        return;
      }
      results.innerHTML = '<div class="wiki-search-results">' +
        items.map(it => `<div class="wiki-result" data-url="${escHtml(it.url)}">
          <img src="${escHtml(it.thumb)}"><span>${escHtml(it.title)}</span>
        </div>`).join('') + '</div>';
      results.querySelectorAll('.wiki-result').forEach(el => {
        el.onclick = () => {
          tile.image = { url: el.dataset.url, opacity: 100, usePixel: false };
          renderImageSection(tile, r, c);
        };
      });
    })
    .catch(() => {
      results.innerHTML = '<div style="color:#5c1b1b;padding:8px">Search failed - check your connection</div>';
    });
}

function getWikiImageUrl(name) {
  name = name.replaceAll(' ', '_');
  name = name.charAt(0).toUpperCase() + name.slice(1);
  return `https://oldschool.runescape.wiki/images/thumb/${encodeURIComponent(name)}_detail.png/180px-${encodeURIComponent(name)}_detail.png`;
}

// Generic icon picker modal — wiki search + custom upload.
// Calls onPick(url) when user selects an image.
function openIconSearchModal(onPick) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.zIndex = '2000'; // sit above other modals
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.maxWidth = '500px';
  modal.innerHTML = `
    <h2 class="osrs-header">Pick an Icon</h2>
    <label>Search OSRS Wiki</label>
    <input type="text" id="icon-search-query" placeholder="e.g. Twisted bow, Combat Achievements...">
    <div id="icon-search-results" style="margin-top:10px"></div>
    <div style="margin-top:12px">
      <button id="icon-upload-btn" style="font-size:0.55rem">Upload Custom Image</button>
      <input type="file" id="icon-upload-input" accept=".png,.jpg,.jpeg,.webp,.gif" style="display:none">
    </div>
    <div class="modal-footer"><button class="danger" id="icon-close">Close</button></div>
  `;
  overlay.appendChild(modal);
  document.getElementById('modal-root').appendChild(overlay);

  const close = () => overlay.remove();
  modal.querySelector('#icon-close').onclick = close;

  const input = modal.querySelector('#icon-search-query');
  input.focus();
  let debounceTimer;
  input.oninput = (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => runIconWikiSearch(e.target.value, (url) => {
      onPick(url);
      close();
    }), 600);
  };

  modal.querySelector('#icon-upload-btn').onclick = () => modal.querySelector('#icon-upload-input').click();
  modal.querySelector('#icon-upload-input').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { onPick(ev.target.result); close(); };
    reader.readAsDataURL(file);
  };
}

function runIconWikiSearch(query, onSelect) {
  const results = document.getElementById('icon-search-results');
  if (!results) return;
  if (!query.trim()) { results.innerHTML = ''; return; }
  query = query.charAt(0).toUpperCase() + query.slice(1).toLowerCase();
  results.innerHTML = '<div style="color:var(--osrs-text-gold);padding:8px">Searching...</div>';

  fetch(`https://oldschool.runescape.wiki/rest.php/v1/search/title?q=${encodeURIComponent(query)}&limit=8`)
    .then(r => r.json())
    .then(async data => {
      if (!data.pages || data.pages.length === 0) {
        results.innerHTML = '<div style="color:#5d503f;padding:8px">No results found</div>';
        return;
      }
      const items = [];
      for (const page of data.pages) {
        if (page.thumbnail && !badTitles.includes(page.title)) {
          const url = getWikiImageUrl(page.title);
          try {
            const resp = await fetch(url, { method: 'HEAD' });
            if (resp.ok) {
              items.push({ title: page.title, thumb: page.thumbnail.url, url });
            } else {
              badTitles.push(page.title);
            }
          } catch { badTitles.push(page.title); }
        }
      }
      if (items.length === 0) {
        // Fall back to the thumbnail directly — works well for non-item pages like CA icons
        const fallback = data.pages.filter(p => p.thumbnail).slice(0, 8).map(p => ({
          title: p.title, thumb: p.thumbnail.url, url: p.thumbnail.url.replace(/^\/\//, 'https://')
        }));
        if (fallback.length === 0) {
          results.innerHTML = '<div style="color:#5d503f;padding:8px">No images found, try different search</div>';
          return;
        }
        renderIconResults(fallback, onSelect, results);
        return;
      }
      renderIconResults(items, onSelect, results);
    })
    .catch(() => {
      results.innerHTML = '<div style="color:#5c1b1b;padding:8px">Search failed - check your connection</div>';
    });
}

function renderIconResults(items, onSelect, container) {
  container.innerHTML = '<div class="wiki-search-results">' +
    items.map(it => `<div class="wiki-result" data-url="${escHtml(it.url)}">
      <img src="${escHtml(it.thumb)}"><span>${escHtml(it.title)}</span>
    </div>`).join('') + '</div>';
  container.querySelectorAll('.wiki-result').forEach(el => {
    el.onclick = () => onSelect(el.dataset.url);
  });
}

// ========== THEME ==========
function getThemeVar(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function applyTheme(theme) {
  if (!theme) return;
  for (const [key, val] of Object.entries(theme)) {
    document.documentElement.style.setProperty(key, val);
  }
}

function resetTheme() {
  for (const key of Object.keys(DEFAULT_THEME)) {
    document.documentElement.style.removeProperty(key);
  }
  boardState.theme = null;
}

function renderClanLogo() {
  const area = document.getElementById('clan-logo-area');
  if (boardState.clanLogo) {
    area.innerHTML = `<img class="board-clan-logo" src="${boardState.clanLogo}" alt="Clan Logo">`;
  } else {
    area.innerHTML = '';
  }
}

  document.getElementById('brand-tile-opacity').oninput = (e) => {

  document.getElementById('brand-save').onclick = () => {

    boardState.boardBgImage = null;

    applyBoardBg();
    applyFont();
    renderBoard();

    for (const [varName, defaultVal] of Object.entries(DEFAULT_THEME)) {
      const picker = modal.querySelector(`input[type="color"][data-var="${varName}"]`);

      if (picker) picker.value = defaultVal;
      if (hexInput) hexInput.value = defaultVal;
    }
    renderLogoSection(overlay);
    renderBoardBgSection(overlay);
    showAlert('Reset to OSRS defaults');
  };

// ========== TIERS MODAL ==========
function openTiersModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  const modal = document.createElement('div');
  modal.className = 'modal';

  let html = '<h2 class="osrs-header">Tier Configuration</h2>';
  html += '<div style="font-size:0.75rem;color:#5d503f;margin-bottom:10px">Each tier has a fixed point value. Tiles are assigned a tier via the point buttons in the tile editor.</div>';

  html += '<div id="tiers-list"></div>';
  html += `<div style="margin-top:10px">
    <button id="add-tier" style="font-size:0.5rem">+ Add Tier</button>
    <button class="danger" id="reset-tiers" style="font-size:0.5rem;margin-left:5px">Reset to Default</button>
  </div>`;
  html += '<div class="modal-footer"><button id="tiers-close">Close</button><button class="success" id="tiers-save">Save</button></div>';

  modal.innerHTML = html;
  overlay.appendChild(modal);
  document.getElementById('modal-root').appendChild(overlay);

  function renderTierRows() {
    const list = modal.querySelector('#tiers-list');
    list.innerHTML = boardState.tiers.map((t, i) => {
      const iconHtml = t.iconUrl
        ? `<img src="${escHtml(t.iconUrl)}" alt="${escHtml(t.name)}">`
        : '<span style="font-size:1rem;opacity:0.4">+</span>';
      return `
      <div class="tier-row">
        <button class="tier-icon-slot" data-idx="${i}" data-action="pick-icon" title="Click to set icon">${iconHtml}</button>
        <input type="text" value="${escHtml(t.name)}" data-idx="${i}" data-field="name">
        <span class="tier-pts-label">Points:</span>
        <input type="number" value="${t.minPts}" min="1" data-idx="${i}" data-field="minPts">
        <input type="color" value="${t.color}" data-idx="${i}" data-field="color">
        <button class="danger" style="font-size:0.4rem;padding:4px 8px" data-idx="${i}" data-action="delete">X</button>
      </div>
      `;
    }).join('');

    // Wire events
    list.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const idx = Number(e.target.dataset.idx);
        const field = e.target.dataset.field;
        if (field === 'minPts') boardState.tiers[idx].minPts = Number(e.target.value);
        else if (field === 'name') boardState.tiers[idx].name = e.target.value;
        else if (field === 'color') boardState.tiers[idx].color = e.target.value;
      });
    });
    list.querySelectorAll('button[data-action="delete"]').forEach(btn => {
      btn.onclick = () => {
        boardState.tiers.splice(Number(btn.dataset.idx), 1);
        renderTierRows();
      };
    });
    list.querySelectorAll('button[data-action="pick-icon"]').forEach(btn => {
      btn.onclick = () => {
        const idx = Number(btn.dataset.idx);
        openIconSearchModal((url) => {
          boardState.tiers[idx].iconUrl = url;
          renderTierRows();
        });
      };
    });
  }

  renderTierRows();

  modal.querySelector('#add-tier').onclick = () => {
    const maxPts = boardState.tiers.length > 0 ? Math.max(...boardState.tiers.map(t => t.minPts)) + 5 : 5;
    boardState.tiers.push({ name: 'New Tier', minPts: maxPts, color: '#555555', iconUrl: '' });
    renderTierRows();
  };

  modal.querySelector('#reset-tiers').onclick = () => {
    boardState.tiers = JSON.parse(JSON.stringify(DEFAULT_TIERS));
    renderTierRows();
    showAlert('Tiers reset to default');
  };

  modal.querySelector('#tiers-close').onclick = () => overlay.remove();
  modal.querySelector('#tiers-save').onclick = () => {
    // Read all current values from inputs (in case change events haven't fired)
    const list = modal.querySelector('#tiers-list');
    list.querySelectorAll('.tier-row').forEach((row, i) => {
      const nameInput = row.querySelector('input[data-field="name"]');
      const ptsInput = row.querySelector('input[data-field="minPts"]');
      const colorInput = row.querySelector('input[data-field="color"]');
      if (nameInput) boardState.tiers[i].name = nameInput.value;
      if (ptsInput) boardState.tiers[i].minPts = Number(ptsInput.value);
      if (colorInput) boardState.tiers[i].color = colorInput.value;
    });
    // Sort tiers by minPts ascending
    boardState.tiers.sort((a, b) => a.minPts - b.minPts);
    renderBoard();
    overlay.remove();
    showAlert('Tiers saved!');
  };
}

// ========== EXPORT ==========
async function exportBoard() {
  showAlert('Generating image...');
  const target = document.getElementById('board-export-area');
  if (typeof html2canvas !== 'function') {
    showAlert('html2canvas library not loaded - check internet connection');
    return;
  }
  try {
    // Make sure all fonts are loaded before rendering
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }

    // Force a fixed tile size so the PNG is consistent regardless of current window size.
    // Re-render at the export size, snap, then restore afterwards.
    const EXPORT_TILE_SIZE = 180;
    _fixedTileSize = EXPORT_TILE_SIZE;
    renderBoard();
    // Wait for layout + image loading
    await new Promise(r => setTimeout(r, 200));

    const canvas = await html2canvas(target, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      imageTimeout: 15000,
      // Ensure cloned DOM keeps the same computed styles + fonts applied
      onclone: (clonedDoc, clonedEl) => {
        // Force all text elements to have explicit styling in the clone
        const allText = clonedEl.querySelectorAll('.tile-title, .tile-desc, .tile-points, .board-title-input, .preview-board-title');
        allText.forEach(el => {
          const computed = window.getComputedStyle(
            document.querySelector(`[data-clone-id="${el.dataset.cloneId}"]`) || el
          );
          // Preserve font-family, font-size, color explicitly
          el.style.fontFamily = computed.fontFamily || el.style.fontFamily;
        });
        // If board title is an input, swap for a div so text renders reliably
        const input = clonedEl.querySelector('.board-title-input');
        if (input) {
          const div = clonedDoc.createElement('div');
          div.className = 'board-title-input';
          div.textContent = input.value;
          // copy all inline styles
          for (const prop of input.style) div.style[prop] = input.style[prop];
          const cs = window.getComputedStyle(input);
          div.style.fontFamily = cs.fontFamily;
          div.style.fontSize = cs.fontSize;
          div.style.color = cs.color;
          div.style.textShadow = cs.textShadow;
          div.style.textAlign = cs.textAlign;
          div.style.padding = cs.padding;
          div.style.width = cs.width;
          div.style.maxWidth = cs.maxWidth;
          input.parentNode.replaceChild(div, input);
        }
      }
    });
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (boardState.title || 'bingo-board').replace(/[^a-zA-Z0-9 _-]/g, '') + '.png';
      a.click();
      URL.revokeObjectURL(url);
      showAlert('Image exported!');
    }, 'image/png');
  } catch (err) {
    console.error('Export failed:', err);
    showAlert('Export failed: ' + err.message);
  } finally {
    // Restore responsive sizing
    _fixedTileSize = null;
    renderBoard();
  }
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let ty = y;
  for (const word of words) {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, ty);
      line = word;
      ty += lineHeight;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, ty);
}

// ========== SAVE / LOAD ==========
function saveBoard() {
  boardState.title = document.getElementById('board-title').value || 'Bingo Board';
  const saved = JSON.parse(localStorage.getItem('osrs-bingo-boards') || '{}');
  saved[boardState.title] = JSON.parse(JSON.stringify(boardState));
  localStorage.setItem('osrs-bingo-boards', JSON.stringify(saved));
  showAlert('Board saved: ' + boardState.title);
}

function showLoadDialog() {
  const section = document.getElementById('saved-boards-section');
  const saved = JSON.parse(localStorage.getItem('osrs-bingo-boards') || '{}');
  const names = Object.keys(saved);
  if (names.length === 0) {
    showAlert('No saved boards found');
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  section.innerHTML = '<h3 class="osrs-header">Saved Boards</h3>' +
    names.map(n => `<div class="saved-board-item">
      <span onclick="loadBoard('${escHtml(n)}')">${escHtml(n)}</span>
      <button class="danger delete-btn" onclick="event.stopPropagation();deleteBoard('${escHtml(n)}')">X</button>
    </div>`).join('');
}

function loadBoard(name) {
  const saved = JSON.parse(localStorage.getItem('osrs-bingo-boards') || '{}');
  if (saved[name]) {
    boardState = JSON.parse(JSON.stringify(saved[name]));
    // Ensure fields exist for older saves
    if (!boardState.theme) boardState.theme = null;
    if (!boardState.clanLogo) boardState.clanLogo = null;
    if (!boardState.tiers) boardState.tiers = JSON.parse(JSON.stringify(DEFAULT_TIERS));
    if (!boardState.boardBgImage) boardState.boardBgImage = null;
    if (boardState.tileOpacity == null) boardState.tileOpacity = 100;
    if (!boardState.font) boardState.font = 'Press Start 2P';
    // Apply saved theme or reset to defaults
    if (boardState.theme) {
      applyTheme(boardState.theme);
    } else {
      resetTheme();
    }
    renderClanLogo();
    applyBoardBg();
    applyFont();
    renderBoard();
    document.getElementById('saved-boards-section').style.display = 'none';
    showAlert('Loaded: ' + name);
  }
}

function deleteBoard(name) {
  const saved = JSON.parse(localStorage.getItem('osrs-bingo-boards') || '{}');
  delete saved[name];
  localStorage.setItem('osrs-bingo-boards', JSON.stringify(saved));
  showLoadDialog();
}

// ========== UTILS ==========
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showAlert(msg) {
  const box = document.getElementById('alert-box');
  box.innerHTML = `<div class="alert">${escHtml(msg)}</div>`;
  setTimeout(() => box.innerHTML = '', 3000);
}

// ========== INIT ==========
document.getElementById('board-title').addEventListener('input', (e) => {
  boardState.title = e.target.value;
});

initTiles();
applyFont();
renderBoard();
renderClanLogo();
applyBoardBg();

// Font load then re-render once fonts are ready
document.fonts.ready.then(() => renderBoard());

// Resize handling — debounced, doesn't fire while shuffling or exporting
let _resizeTimer;
window.addEventListener('resize', () => {
  if (_shuffling || _fixedTileSize != null) return;
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => renderBoard(), 150);
});
</script>
